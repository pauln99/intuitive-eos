id: PM_Q2_2026_DPU
title: Development Planning & Utilisation — Running and Delivering
owner: michelleb
department: PM
quarter: Q2_2026
outcome: >
  A reliable monthly development planning process, live and running across the
  development team. Producing the best available forward view of each month —
  covering capacity, planned workstream and planned revenue. Tracked against
  actual utilisation and revenue once work is fed into the month, giving clear
  visibility on what we could do vs what we actually did, and understanding the
  reasons for any gaps or changes.

  An initial baseline April view produced by 31 March. Planning rules agreed
  and documented by 17 April — establishing what utilisation and revenue targets
  mean in practice. Targeting 95% team utilisation and 95% of planned revenue
  for April, May and June 2026.
exciting: true
clear: true
deliverable: true
status: on_track
risks:
  - Customer approval windows of up to 90 days make revenue work unplannable in advance
  - Gaps in customer demand filled with roadmap work are not revenue-generating, skewing revenue targets
  - Urgent customer requests can displace any forward view at short notice
  - Dev team performance issues — overruns or a decline in quality (increased PRIs) can displace planned work and impact revenue. Michelle has no control over development team productivity or output.
  - Utilisation and revenue targets are dependent on demand, which is outside Michelle's control
