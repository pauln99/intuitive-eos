title: Development Planning & Utilisation — Running and Delivering
owner: michelleb
department: PM
quarter: Q2_2026
outcome: >
  A reliable monthly development planning process, live and running. Producing
  the best available forward view of the month for the development team —
  covering capacity, planned workstream and planned revenue. Tracked against
  actual utilisation and revenue once work is fed into the month, giving clear
  visibility on what we could do vs what we actually did, and understanding the
  reasons for any gaps or changes. Targeting 95% team utilisation and 95% of
  planned revenue for May and June 2026.
exciting: true
clear: true
deliverable: true
status: on_track
risks:
  - Customer approval windows of up to 90 days make revenue work unplannable in advance
  - Gaps in customer demand filled with roadmap work are not revenue-generating, skewing revenue targets
  - Urgent customer requests can displace any forward view at short notice
  - Dev overruns — if the team takes longer than planned on jobs, the entire month's plan unravels
  - Utilisation and revenue targets are dependent on demand, which is outside Michelle's control
